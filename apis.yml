aid: inversion-of-control
name: Inversion of Control
description: >-
  Inversion of Control (IoC) is a software design principle where the control
  flow of a program is inverted compared to traditional programming. Instead of
  application code calling frameworks, frameworks call application code. Common
  implementations include Dependency Injection and event-driven programming.
